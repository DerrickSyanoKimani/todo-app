<!DOCTYPE html>
<html lang="en">
<!-- Head section: Contains metadata and links -->
<head>
    <!-- Page title that appears in the browser tab -->
    <title>My To-Do List</title>
    <!-- Link to external CSS stylesheet for styling -->
    <link rel="stylesheet" href="stylesheet.css">
</head>

<!-- Body section: Contains all visible content -->
<body>
    <div class="app-container">
        <!-- Main heading -->
        <h1>My To-Do List</h1>

        <div class="input-area">
            <!-- Input field where users type their tasks -->
            <input type="text" id="taskInput" placeholder="Enter a task">
            <!-- Button to add the task to the list -->
            <button id="addBtn" class="add-button">Add</button>
        </div>
        
        <!-- Unordered list that displays all tasks -->
        <ul id="taskList"></ul>
    </div>
    <!-- Link to external JavaScript file for functionality -->
    <script src="script.js"></script>
</body>
</html>
